<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo đề Toán</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">Tạo đề kiểm tra Toán</header>

  <main class="container">
    <div class="card">
      <label>Khối lớp</label>
      <select id="grade">
        <option>10</option><option>11</option><option>12</option>
      </select>

      <label>Chủ đề</label>
      <input id="topic" placeholder="Ví dụ: Hàm số bậc hai">

      <button onclick="generateQuiz()">Tạo đề bằng AI</button>
    </div>

    <div id="result" class="card"></div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
